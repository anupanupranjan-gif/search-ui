apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-ui
  labels:
    app: search-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-ui
  template:
    metadata:
      labels:
        app: search-ui
    spec:
      containers:
        - name: search-ui
          image: search-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: search-ui
spec:
  selector:
    app: search-ui
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
